<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Inventario - Versión Estable Final</title>
    <style>
        :root {
            --primary-color: #32527B; 
            --hover-color: #233b5a;
            --bg-color: #f4f6f9;
            --text-color: #333;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1, h2, h3 { color: var(--primary-color); }
        button {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            margin: 5px;
        }
        button:hover { background-color: var(--hover-color); }
        .danger { background-color: #d9534f; }
        .danger:hover { background-color: #c9302c; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 15px; }
        .card { padding: 15px; border: 1px solid #ddd; border-radius: 4px; background: #fafafa; }
        input, select { padding: 8px; margin: 5px 0; width: 100%; box-sizing: border-box; }
        .header-actions { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-actions">
        <h1>Control de Inventario</h1>
        <div>
            <input type="date" id="fecha" value="">
            <input type="file" id="csvInput" accept=".csv" style="display:inline-block; width:auto;">
            <button onclick="importarCSV(false)">Añadir a DB Actual</button>
            <button onclick="importarCSV(true)" class="danger">Rescate Total CSV</button>
            <button onclick="imprimirReportePro()">Generar Reporte Pro</button>
        </div>
    </div>

    <hr>

    <h2>Stock Actual</h2>
    <div id="stockContainer" class="grid"></div>
    <div style="margin-top: 15px;">
        <button onclick="verStockActual()">Actualizar Vista</button>
        <button onclick="resetearStock()" class="danger">Resetear Todo el Stock a 0</button>
    </div>
</div>

<script>
    // ==========================================
    // INICIALIZACIÓN Y UTILIDADES DE FECHA/TEXTO
    // ==========================================
    
    function parseLocalDate(fechaStr) {
        if (!fechaStr) return null;
        const [y, m, d] = String(fechaStr).split('-').map(Number);
        if (!y || !m || !d) return null;

        const dt = new Date(y, m - 1, d);
        if (
            dt.getFullYear() !== y ||
            dt.getMonth() !== (m - 1) ||
            dt.getDate() !== d
        ) return null;

        return dt;
    }

    function hoyLocalISO() {
        const d = new Date();
        const offset = d.getTimezoneOffset();
        const local = new Date(d.getTime() - offset * 60000);
        return local.toISOString().split('T')[0];
    }

    function escJsStr(str) {
        return String(str).replace(/\\/g, '\\\\').replace(/'/g, "\\'");
    }

    function escHtml(str) {
        return String(str)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;');
    }

    document.addEventListener('DOMContentLoaded', () => {
        document.getElementById('fecha').value = hoyLocalISO();
        verStockActual();
    });

    function getNumeroSemana(fechaStr) {
        const d = parseLocalDate(fechaStr);
        if (!d || isNaN(d.getTime())) return 0;
        d.setHours(0, 0, 0, 0);
        d.setDate(d.getDate() + 4 - (d.getDay() || 7));
        const yearStart = new Date(d.getFullYear(), 0, 1);
        return Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
    }

    function enviarNube(reg) {
        const scriptURL = 'TU_URL_DE_GOOGLE_APPS_SCRIPT_AQUI'; 
        if(scriptURL === 'TU_URL_DE_GOOGLE_APPS_SCRIPT_AQUI') return;
        
        const formData = new FormData();
        Object.keys(reg).forEach(key => formData.append(key, reg[key]));
        
        fetch(scriptURL, { method: 'POST', body: formData, mode: 'no-cors' })
            .then(() => console.log('Envío solicitado a Google Sheets'))
            .catch(error => console.error('Error en fetch:', error));
    }

    function ordenarDBCronologicamente(db) {
        return db
            .map((r, idx) => ({ ...r, _ord: idx }))
            .sort((a, b) => {
                const da = parseLocalDate(a.fecha);
                const dbb = parseLocalDate(b.fecha);

                const ta = da ? da.getTime() : 0;
                const tb = dbb ? dbb.getTime() : 0;

                if (ta !== tb) return ta - tb;
                return a._ord - b._ord;
            })
            .map(({ _ord, ...r }) => r);
    }

    // ==========================================
    // GESTIÓN DE STOCK (EDICIÓN, BORRADO, RESET)
    // ==========================================
    function promptEditarStock(material, actualVal) {
        let newValStr = prompt(`Ajustar stock de ${material}\nActual: ${actualVal}\nNuevo valor:`, actualVal);
        if (newValStr !== null) {
            const nuevoVal = parseFloat(newValStr);
            if (isNaN(nuevoVal) || nuevoVal < 0) {
                return alert("Ingresa un valor numérico mayor o igual a 0.");
            }

            let stock = JSON.parse(localStorage.getItem('plastinova_stock_v1')) || {};
            let db = JSON.parse(localStorage.getItem('plastinova_bd_v2')) || [];
            const hoy = document.getElementById('fecha').value || hoyLocalISO();

            const reg = {
                id: Date.now() + Math.random().toString(36).substr(2, 9),
                fecha: hoy,
                semana: getNumeroSemana(hoy),
                vendedor: 'AJUSTE_MANUAL',
                tipo: 'INVENTARIO_FISICO',
                concepto: `REAL: ${material} (AJUSTE MANUAL DESDE ${actualVal} A ${nuevoVal})`,
                cantidad: nuevoVal,
                precio: 0,
                total: 0,
                capacidad: null,
                colorUI: material
            };

            db.push(reg);
            stock[material] = nuevoVal;

            db = ordenarDBCronologicamente(db);

            localStorage.setItem('plastinova_bd_v2', JSON.stringify(db));
            localStorage.setItem('plastinova_stock_v1', JSON.stringify(stock));
            enviarNube(reg);
            verStockActual();
            alert('✅ Ajuste manual guardado con trazabilidad.');
        }
    }

    function promptBorrarStock(material) {
        let stock = JSON.parse(localStorage.getItem('plastinova_stock_v1')) || {};
        const anterior = parseFloat(stock[material] || 0);

        if (confirm(`🗑️ ¿ESTÁS SEGURO?\nEsto pondrá '${material}' en 0 y dejará rastro en historial.`)) {
            let db = JSON.parse(localStorage.getItem('plastinova_bd_v2')) || [];
            const hoy = document.getElementById('fecha').value || hoyLocalISO();

            const reg = {
                id: Date.now() + Math.random().toString(36).substr(2, 9),
                fecha: hoy,
                semana: getNumeroSemana(hoy),
                vendedor: 'AJUSTE_MANUAL',
                tipo: 'INVENTARIO_FISICO',
                concepto: `REAL: ${material} (AJUSTE MANUAL DESDE ${anterior} A 0)`,
                cantidad: 0,
                precio: 0,
                total: 0,
                capacidad: null,
                colorUI: material
            };

            db.push(reg);
            stock[material] = 0;

            db = ordenarDBCronologicamente(db);

            localStorage.setItem('plastinova_bd_v2', JSON.stringify(db));
            localStorage.setItem('plastinova_stock_v1', JSON.stringify(stock));
            enviarNube(reg);
            verStockActual();
            alert(`✅ '${material}' quedó en 0 con trazabilidad.`);
        }
    }

    function resetearStock() {
        if (!confirm("🚨 ¿Poner en 0 todo el stock LOCAL? Se generarán registros de auditoría en cero para cada material.")) return;

        let stock = JSON.parse(localStorage.getItem('plastinova_stock_v1')) || {};
        let db = JSON.parse(localStorage.getItem('plastinova_bd_v2')) || [];
        const hoy = document.getElementById('fecha').value || hoyLocalISO();
        const sem = getNumeroSemana(hoy);

        Object.keys(stock).forEach(material => {
            const valActual = parseFloat(stock[material]) || 0;
            if(valActual !== 0) {
                const reg = {
                    id: Date.now() + Math.random().toString(36).substr(2, 9) + Math.random().toString(36).substr(2, 4),
                    fecha: hoy,
                    semana: sem,
                    vendedor: 'AJUSTE_MANUAL',
                    tipo: 'INVENTARIO_FISICO',
                    concepto: `REAL: ${material} (RESETEADO A 0 DESDE ${valActual})`,
                    cantidad: 0,
                    precio: 0,
                    total: 0,
                    capacidad: null,
                    colorUI: material
                };
                db.push(reg);
                enviarNube(reg);
            }
        });

        db = ordenarDBCronologicamente(db);

        localStorage.setItem('plastinova_bd_v2', JSON.stringify(db));
        localStorage.setItem('plastinova_stock_v1', JSON.stringify({}));
        verStockActual();
        alert("✅ Stock en 0 con trazabilidad completa.");
    }

    function verStockActual() {
        const container = document.getElementById('stockContainer');
        let stock = JSON.parse(localStorage.getItem('plastinova_stock_v1')) || {};
        container.innerHTML = '';
        
        if(Object.keys(stock).length === 0) {
            container.innerHTML = '<p>El stock está vacío.</p>';
            return;
        }

        for (const [material, cantidad] of Object.entries(stock)) {
            // CORRECCIÓN 3 APLICADA: Formato visual limpio para decimales o enteros
            const qty = parseFloat(cantidad) || 0;
            const qtyFmt = Number.isInteger(qty) ? qty : qty.toFixed(2);
            
            container.innerHTML += `
                <div class="card">
                    <h3>${escHtml(material)}</h3>
                    <p>Cantidad: <strong>${qtyFmt}</strong></p>
                    <button onclick="promptEditarStock('${escJsStr(material)}', ${qty})" style="padding: 5px; font-size: 12px;">Editar</button>
                    <button onclick="promptBorrarStock('${escJsStr(material)}')" class="danger" style="padding: 5px; font-size: 12px;">A 0</button>
                </div>
            `;
        }
    }

    // ==========================================
    // IMPORTACIÓN CSV Y RECONSTRUCCIÓN
    // ==========================================
    function parseCSVLine(line) {
        const out = [];
        let cur = '';
        let inQuotes = false;
        for (let i = 0; i < line.length; i++) {
            const ch = line[i];
            if (ch === '"') {
                if (inQuotes && line[i + 1] === '"') {
                    cur += '"';
                    i++;
                } else {
                    inQuotes = !inQuotes;
                }
            } else if (ch === ',' && !inQuotes) {
                out.push(cur);
                cur = '';
            } else {
                cur += ch;
            }
        }
        out.push(cur);
        return out.map(v => v.trim());
    }

    function importarCSV(esRescate) {
        if (!esRescate) {
            if (!confirm("⚠️ Esto añadirá registros a la DB actual. Si el archivo ya fue importado antes, podrías duplicar movimientos. ¿Continuar?")) return;
        }

        const fileInput = document.getElementById('csvInput');
        if (!fileInput.files.length) {
            alert("Por favor selecciona un archivo CSV primero.");
            return;
        }

        const reader = new FileReader();
        reader.onload = function(e) {
            const text = e.target.result.replace(/\r\n/g, '\n').replace(/\r/g, '\n');
            const lines = text.split('\n');
            
            let db = JSON.parse(localStorage.getItem('plastinova_bd_v2')) || [];
            let registrosAImportar = [];
            const seen = new Set(); 

            for (let i = 1; i < lines.length; i++) {
                if (!lines[i].trim()) continue;
                const cols = parseCSVLine(lines[i]);
                
                const fechaStr = cols[0] || '';
                
                const fechaObj = parseLocalDate(fechaStr);
                if (!fechaObj) continue; 

                const sem = getNumeroSemana(fechaStr);
                const vendStr = cols[1] ? cols[1].toUpperCase() : '';
                const tipoMov = cols[2] || '';
                const conceptoStr = cols[3] || '';
                const cant = parseFloat(cols[4]) || 0;
                const precioVal = parseFloat(cols[5]) || 0;
                const totalVal = parseFloat(cols[6]) || 0;

                const reg = {
                    id: Date.now() + Math.random().toString(36).substr(2, 9) + i,
                    _idx: i,
                    fecha: fechaStr,
                    semana: sem,
                    vendedor: vendStr,
                    tipo: tipoMov,
                    concepto: conceptoStr,
                    cantidad: cant,
                    precio: precioVal,
                    total: totalVal,
                    capacidad: cols[7] || null,
                    colorUI: cols[8] || null
                };

                // CORRECCIÓN 1 APLICADA: Key de deduplicación ampliada con capacidad y colorUI
                const key = [
                    reg.fecha,
                    reg.semana,
                    reg.vendedor,
                    reg.tipo,
                    reg.concepto,
                    reg.cantidad,
                    reg.precio,
                    reg.total,
                    reg.capacidad || '',
                    reg.colorUI || ''
                ].join('|');
                
                if (seen.has(key)) continue;
                seen.add(key);

                if (!esRescate) {
                    // CORRECCIÓN 1 APLICADA: db.find ampliado con validación estricta de strings
                    let existe = db.find(x =>
                        x.fecha === reg.fecha &&
                        x.semana === reg.semana &&
                        x.vendedor === reg.vendedor &&
                        x.tipo === reg.tipo &&
                        x.concepto === reg.concepto &&
                        parseFloat(x.cantidad) === parseFloat(reg.cantidad) &&
                        parseFloat(x.precio) === parseFloat(reg.precio) &&
                        parseFloat(x.total) === parseFloat(reg.total) &&
                        String(x.capacidad || '') === String(reg.capacidad || '') &&
                        String(x.colorUI || '') === String(reg.colorUI || '')
                    );
                    if (existe) continue; 
                }

                registrosAImportar.push(reg);
            }

            if (esRescate) {
                db = registrosAImportar;
            } else {
                db.push(...registrosAImportar);
            }

            db = ordenarDBCronologicamente(db);

            localStorage.setItem('plastinova_bd_v2', JSON.stringify(db));
            reconstruirStock(db);
            alert("✅ Archivo importado y procesado exitosamente.");
            fileInput.value = ''; 
        };
        reader.readAsText(fileInput.files[0]);
    }

    // CORRECCIÓN 2 APLICADA: Fallback legacy controlado para TINACO/TAMBO sin colorUI
    function resolverClaveStockDesdeRegistro(r) {
        const mat = (r.colorUI || '').trim();
        if (mat) return mat;

        const tipo = (r.tipo || '').trim();
        const concepto = (r.concepto || '').trim();
        const cap = (r.capacidad || '').trim();

        if ((tipo.includes('TINACO') || tipo.includes('TAMBO')) && !mat) {
            if (!cap) return '';
            if (tipo.includes('TINACO')) return `TINACO ${cap} [LEGACY]`;
            if (tipo.includes('TAMBO')) return `TAMBO ${cap} [LEGACY]`;
        }

        if ((tipo === 'COMPRA' || tipo === 'MERMA' || tipo === 'INVENTARIO_FISICO') && concepto) {
            if (concepto.startsWith('REAL: ')) return concepto.replace('REAL: ', '').split(' (')[0].trim();
            if (concepto.startsWith('INGRESO: ')) return concepto.replace('INGRESO: ', '').split(' (')[0].trim();
            if (concepto.startsWith('MERMA: ')) return concepto.replace('MERMA: ', '').split(' (')[0].trim();
        }

        return '';
    }

    function reconstruirStock(db) {
        let nuevoStock = {};
        db.forEach(r => {
            const mat = resolverClaveStockDesdeRegistro(r);
            if (!mat) return;
            
            nuevoStock[mat] = nuevoStock[mat] || 0;
            const cant = parseFloat(r.cantidad) || 0;
            
            const tipo = String(r.tipo || '');

            if (tipo === 'INVENTARIO_FISICO') {
                nuevoStock[mat] = cant;
            } else if (tipo.includes('PROD_') || tipo.includes('COMPRA') || tipo === 'ENTRADA') {
                nuevoStock[mat] += cant;
            } else if (
                tipo === 'MERMA' ||
                (tipo.includes('VENTA') && !tipo.includes('_COBRO')) ||
                tipo === 'SALIDA' ||
                (tipo.includes('TRASPASO') && !tipo.includes('_COBRO'))
            ) {
                nuevoStock[mat] -= cant;
            }
        });
        localStorage.setItem('plastinova_stock_v1', JSON.stringify(nuevoStock));
        verStockActual();
    }

    // ==========================================
    // REPORTES
    // ==========================================
    function imprimirReportePro() {
        let db = JSON.parse(localStorage.getItem('plastinova_bd_v2')) || [];
        const fechaBase = document.getElementById('fecha').value;
        if (!fechaBase) return alert("Selecciona una fecha válida.");

        db = db.filter(r => r.fecha === fechaBase);

        let totalTinacos = 0;
        let totalTambos = 0;
        let totalVentas = 0;

        db.forEach(r => {
            const isTin = (r.tipo || '').includes('TINACO');
            const isTam = (r.tipo || '').includes('TAMBO');

            const esVenta = (r.tipo || '').includes('VENTA') && !(r.tipo || '').includes('_COBRO');
            const esProd = (r.tipo || '').includes('PROD_');

            const qty = parseFloat(r.cantidad) || 0;
            const total = parseFloat(r.total) || 0;

            if (esProd && isTin) totalTinacos += qty;
            if (esProd && isTam) totalTambos += qty;
            if (esVenta) totalVentas += total;
        });

        alert(`📊 REPORTE PRO DEL ${fechaBase}:\n\nTinacos producidos: ${totalTinacos}\nTambos producidos: ${totalTambos}\nIngresos Venta: $${totalVentas.toFixed(2)}`);
    }
</script>
</body>
</html>
